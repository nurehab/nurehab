  <rect x="0" y="0" width="650" height="300" rx="12" ry="12" fill="url(#termBg)" stroke="#2d2d3a" stroke-width="1"/>
  
  <rect x="0" y="0" width="650" height="36" rx="12" ry="12" fill="#1e1f29"/>
